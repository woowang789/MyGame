<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyGame</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1a1a1a;
        color: #eee;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #game-root {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      /*
       * HUD 가이드: 눈에 띄지 않게 좌상단에 옅게. 포커스되면 또렷해지지만 평상시에는
       * 보조 정보로만 보이게 한다.
       */
      #hud {
        position: fixed;
        top: 10px;
        left: 10px;
        font-size: 11px;
        color: #8a8a96;
        opacity: 0.6;
        pointer-events: none;
        letter-spacing: 0.2px;
      }

      /*
       * 채팅 박스: 기본은 얇게(입력줄만), Enter 로 포커스되면 로그를 펼친다.
       * 새 메시지가 오면 잠시 "ghost" 상태로 로그가 반투명으로 드러났다가 페이드.
       * 실제 포커스 시에는 .expanded 로 고정되어 사라지지 않는다.
       */
      #chat-box {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 14px;
        width: 520px;
        max-width: 90vw;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        pointer-events: none;                    /* 기본은 이벤트 통과 (게임 입력 보호) */
      }
      #chat-log {
        max-height: 140px;
        overflow-y: auto;
        font-size: 12px;
        line-height: 1.5;
        padding: 6px 10px;
        margin-bottom: 4px;
        background: rgba(0, 0, 0, 0);
        border-radius: 6px;
        opacity: 0;
        transition: opacity 240ms ease, background 240ms ease, max-height 200ms ease;
        pointer-events: none;
      }
      #chat-box.expanded #chat-log,
      #chat-box.ghost #chat-log {
        opacity: 1;
        background: rgba(0, 0, 0, 0.55);
      }
      #chat-box.expanded #chat-log {
        pointer-events: auto;
      }
      #chat-box.ghost #chat-log {
        opacity: 0.75;                           /* 일시 표시: 포커스 없이 반투명 */
      }
      #chat-log .sys { color: #9fdcff; }
      #chat-log .whisper { color: #ffb4ff; }
      #chat-log .all { color: #ffffff; }
      #chat-input {
        width: 100%;
        box-sizing: border-box;
        background: rgba(0, 0, 0, 0.35);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 4px;
        padding: 5px 8px;
        font-size: 12px;
        outline: none;
        opacity: 0.45;
        transition: opacity 160ms ease, background 160ms ease, border-color 160ms ease;
        pointer-events: auto;
      }
      #chat-input:hover { opacity: 0.8; }
      #chat-box.expanded #chat-input {
        opacity: 1;
        background: rgba(0, 0, 0, 0.7);
        border-color: #ffeb8a;
      }

      /* Phase L — 로그인 화면 */
      #login-root {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f0f17;
        z-index: 100;
      }
      #login-card {
        background: #1b1b2a;
        padding: 28px 32px;
        border-radius: 10px;
        width: 320px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      #login-card h1 {
        margin: 0 0 18px 0;
        font-size: 20px;
        color: #ffeb8a;
        letter-spacing: 0.5px;
      }
      #login-card label {
        display: block;
        font-size: 12px;
        color: #aab;
        margin-top: 10px;
      }
      #login-card input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 8px 10px;
        background: #0e0e18;
        color: #fff;
        border: 1px solid #2a2a3b;
        border-radius: 4px;
        outline: none;
        font-size: 13px;
      }
      #login-card input:focus { border-color: #ffeb8a; }
      #login-buttons {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      #login-buttons button {
        flex: 1;
        padding: 9px 12px;
        background: #2a2a3b;
        color: #fff;
        border: 1px solid #3a3a55;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
      }
      #login-buttons button:hover { background: #3a3a55; }
      #login-buttons button.primary {
        background: #ffeb8a;
        color: #1b1b2a;
        border-color: #ffeb8a;
      }
      #login-buttons button.primary:hover { background: #ffd84a; }
      #login-msg {
        margin-top: 10px;
        font-size: 12px;
        color: #ff7a7a;
        min-height: 16px;
      }
      #login-msg.ok { color: #7aff9c; }

      /*
       * 플레이어 카드(우측): 이름·레벨·EXP·장비·스탯·메소·HP/MP·스킬을 한 카드에 모았다.
       * 이전 #equip-box / #skill-box 두 패널이 분산되어 있던 HUD 를 통합한 결과.
       */
      #player-card {
        position: fixed;
        right: 12px;
        top: 12px;
        width: 220px;
        background: rgba(0, 0, 0, 0.58);
        color: #fff;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        font-size: 12px;
        line-height: 1.55;
      }
      #player-card .section + .section {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      #player-card .title {
        font-weight: 600;
        font-size: 11px;
        letter-spacing: 0.3px;
        text-transform: uppercase;
        color: #ffc64a;
        margin-bottom: 4px;
      }
      #player-card .name-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
      }
      #player-card .pname {
        font-weight: 700;
        font-size: 14px;
        color: #ffeb8a;
      }
      #player-card .plevel {
        font-size: 11px;
        color: #aee1ff;
      }
      /* EXP/HP/MP 공용 바 스타일. 높이·테두리 한 곳에서 관리. */
      #player-card .bar-row {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        margin-top: 4px;
      }
      #player-card .bar-row .label {
        width: 22px;
        color: #aab;
      }
      #player-card .bar-bg {
        flex: 1;
        height: 8px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 3px;
        overflow: hidden;
      }
      #player-card .bar-fill {
        height: 100%;
        width: 0;
        transition: width 120ms linear;
      }
      #player-card .bar-fill.exp { background: linear-gradient(90deg, #ffc64a, #ffe68a); }
      #player-card .bar-fill.hp  { background: linear-gradient(90deg, #ff4a4a, #ff7a7a); }
      #player-card .bar-fill.mp  { background: linear-gradient(90deg, #4aa3ff, #7bd4ff); }
      #player-card .bar-row .val {
        width: 70px;
        text-align: right;
        color: #ddd;
        font-variant-numeric: tabular-nums;
      }

      #player-card .slot {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
      }
      #player-card .slot .name { color: #9fdcff; }
      #player-card .slot .val  { color: #fff; }
      #player-card .meso {
        color: #ffd84a;
        text-align: right;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      #player-card .stats-line {
        color: #aee1ff;
        font-size: 11px;
      }
      #player-card .hint {
        margin-top: 4px;
        font-size: 10px;
        color: #888;
      }

      #player-card .skill {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 2px 0;
      }
      #player-card .skill .kbd {
        display: inline-block;
        min-width: 16px;
        padding: 1px 4px;
        background: #2a2a3b;
        border: 1px solid #4a4a6a;
        border-radius: 3px;
        font-size: 10px;
        text-align: center;
        color: #ffeb8a;
      }
      #player-card .skill .sname { flex: 1; }
      #player-card .skill .cd {
        font-size: 10px;
        color: #ff7a7a;
        min-width: 30px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      #player-card .skill.cooling { opacity: 0.45; }

      /*
       * 인벤토리 창(플로팅): I 키로 토글. Esc 또는 X 버튼으로 닫기.
       * 게임 위에 띄우지만 입력을 가로막지 않아 이동·공격·채팅이 병행 가능.
       * 24칸 그리드(6열×4행) 기본, 아이템이 많아지면 세로 스크롤.
       */
      #inventory-window {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 320px;
        background: rgba(16, 18, 28, 0.92);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
        font-size: 12px;
        z-index: 50;
      }
      #inventory-window.hidden { display: none; }

      #inventory-window .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        user-select: none;
      }
      #inventory-window .header .title {
        font-weight: 700;
        color: #ffeb8a;
        letter-spacing: 0.4px;
      }
      #inventory-window .header .hint {
        font-size: 10px;
        color: #7a7a88;
      }
      #inventory-window .close-btn {
        background: transparent;
        color: #aaa;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 4px;
        width: 22px;
        height: 22px;
        line-height: 1;
        font-size: 13px;
        cursor: pointer;
        pointer-events: auto;
      }
      #inventory-window .close-btn:hover {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.28);
      }

      /*
       * 탭 바: 장비 / 소비 / 기타. 클릭 시 .active 토글, HudView 가 현 탭의 아이템만 렌더.
       */
      #inventory-window .tabs {
        display: flex;
        gap: 4px;
        padding: 6px 8px 0 8px;
      }
      #inventory-window .tabs .tab {
        flex: 1;
        padding: 5px 0;
        text-align: center;
        font-size: 11px;
        color: #8a8a96;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-bottom: none;
        border-radius: 4px 4px 0 0;
        cursor: pointer;
        user-select: none;
      }
      #inventory-window .tabs .tab:hover { color: #ddd; }
      #inventory-window .tabs .tab.active {
        color: #ffeb8a;
        background: rgba(255, 235, 138, 0.08);
        border-color: rgba(255, 235, 138, 0.3);
      }

      #inventory-window .body {
        padding: 10px;
        max-height: 60vh;
        overflow-y: auto;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      /* 툴팁: 슬롯 hover 시 이름·타입·설명·보너스를 표시. */
      #item-tooltip {
        position: fixed;
        z-index: 120;
        max-width: 220px;
        padding: 8px 10px;
        background: rgba(12, 14, 22, 0.96);
        color: #fff;
        border: 1px solid rgba(255, 235, 138, 0.35);
        border-radius: 6px;
        font-size: 11px;
        line-height: 1.55;
        pointer-events: none;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      }
      #item-tooltip.hidden { display: none; }
      #item-tooltip .tt-name {
        font-weight: 700;
        color: #ffeb8a;
        margin-bottom: 2px;
      }
      #item-tooltip .tt-type {
        font-size: 10px;
        color: #8a8a96;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      #item-tooltip .tt-bonus {
        margin-top: 4px;
        color: #aee1ff;
      }
      #item-tooltip .tt-desc {
        margin-top: 4px;
        color: #cfcfd6;
      }
      #inventory-window .inv-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
      }
      #inventory-window .inv-slot {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        background: rgba(0, 0, 0, 0.4);
        border: 1px dashed rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        cursor: default;
      }
      #inventory-window .inv-slot.filled {
        border-style: solid;
        border-color: rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.55);
      }
      #inventory-window .inv-slot.filled {
        cursor: grab;
      }
      #inventory-window .inv-slot.filled:hover {
        border-color: #ffeb8a;
        box-shadow: 0 0 0 1px rgba(255, 235, 138, 0.25);
      }
      #inventory-window .inv-slot.filled:active { cursor: grabbing; }
      /*
       * 아이콘: Phaser 의 DroppedItemSprite 가 그리는 다이아몬드를 CSS 로 흉내낸다.
       * 실제 이미지 에셋이 생기기 전까지는 "색상 + 모양" 으로 아이템을 구분.
       */
      #inventory-window .inv-icon {
        position: absolute;
        inset: 18%;
        transform: rotate(45deg);
        border: 1px solid rgba(255, 255, 255, 0.65);
        border-radius: 4px;
      }
      #inventory-window .inv-qty {
        position: absolute;
        right: 3px;
        bottom: 2px;
        font-size: 10px;
        font-weight: 700;
        color: #ffeb8a;
        text-shadow: 0 1px 0 #000;
        font-variant-numeric: tabular-nums;
      }

      /* 사망 오버레이 */
      #death-overlay {
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.7);
        z-index: 90;
      }
      #death-overlay.active { display: flex; }
      #death-overlay .panel {
        text-align: center;
        padding: 28px 40px;
        background: rgba(30, 0, 0, 0.85);
        border: 1px solid #5a2222;
        border-radius: 10px;
        color: #fff;
      }
      #death-overlay .title {
        font-size: 28px;
        font-weight: 700;
        color: #ff6b6b;
        letter-spacing: 3px;
      }
      #death-overlay .sub {
        margin-top: 8px;
        font-size: 13px;
        color: #aaa;
      }
      #death-overlay .countdown {
        margin-top: 14px;
        font-size: 32px;
        font-weight: 700;
        color: #ffeb8a;
      }
    </style>
  </head>
  <body>
    <div id="login-root">
      <div id="login-card">
        <h1>MyGame 로그인</h1>
        <label for="login-username">아이디 (3~16자, 영숫자/_/-)</label>
        <input id="login-username" type="text" autocomplete="username" maxlength="16" />
        <label for="login-password">비밀번호 (6자 이상)</label>
        <input id="login-password" type="password" autocomplete="current-password" maxlength="64" />
        <div id="login-buttons">
          <button id="btn-login" class="primary" type="button">로그인</button>
          <button id="btn-register" type="button">회원가입</button>
        </div>
        <div id="login-msg"></div>
      </div>
    </div>

    <div id="hud">방향키 이동 · ↑ 점프/포털 · Space 공격 · I 인벤 · Enter 채팅 · /w 이름 내용 · Q 장비착용 E 해제</div>
    <div id="game-root"></div>

    <div id="chat-box">
      <div id="chat-log"></div>
      <input id="chat-input" type="text" placeholder="Enter 로 채팅 · /w 닉네임 메시지 로 귓속말" maxlength="200" />
    </div>

    <!--
      인벤토리 창(플로팅). I 키로 토글, Esc/X 로 닫기.
      슬롯 그리드는 HudView.updateInventory 가 동적 렌더한다.
    -->
    <div id="inventory-window" class="hidden">
      <div class="header">
        <span class="title">인벤토리</span>
        <span class="hint">더블클릭: 장착/사용 · Shift+더블클릭: 버리기 · 드래그: 정렬</span>
        <button id="inv-close" class="close-btn" type="button" aria-label="닫기">×</button>
      </div>
      <div class="tabs" id="inv-tabs">
        <div class="tab active" data-tab="EQUIPMENT">장비</div>
        <div class="tab" data-tab="CONSUMABLE">소비</div>
        <div class="tab" data-tab="ETC">기타</div>
      </div>
      <div class="body">
        <div id="inv-grid" class="inv-grid"></div>
      </div>
    </div>

    <!-- 아이템 호버 툴팁. 항상 DOM 에 존재하고 표시/위치만 JS 가 제어. -->
    <div id="item-tooltip" class="hidden">
      <div class="tt-name"></div>
      <div class="tt-type"></div>
      <div class="tt-bonus"></div>
      <div class="tt-desc"></div>
    </div>

    <!--
      플레이어 카드(우측). 캐릭터 · EXP · 장비 · 스탯 · 메소 · HP/MP · 스킬을 한 카드에 통합.
      각 섹션은 .section 래퍼로 감싸 구분선을 자동 부여.
    -->
    <div id="player-card">
      <div class="section">
        <div class="name-row">
          <span class="pname" id="pc-name">-</span>
          <span class="plevel" id="pc-level">Lv 1</span>
        </div>
        <div class="bar-row">
          <span class="label">EXP</span>
          <div class="bar-bg"><div class="bar-fill exp" id="exp-bar-fill"></div></div>
          <span class="val" id="exp-text">0 / 0</span>
        </div>
      </div>

      <div class="section">
        <div class="title">장비</div>
        <div class="slot"><span class="name">무기</span><span class="val" id="eq-weapon">-</span></div>
        <div class="slot"><span class="name">모자</span><span class="val" id="eq-hat">-</span></div>
        <div class="slot"><span class="name">갑옷</span><span class="val" id="eq-armor">-</span></div>
        <div class="stats-line" id="eq-stats">ATK 0 · MAXHP 0</div>
        <div class="meso" id="meso-text">0 메소</div>
        <div class="hint">슬롯 더블클릭 해제 · Q 첫 장비 착용 · E 전부 해제</div>
      </div>

      <div class="section">
        <div class="bar-row">
          <span class="label">HP</span>
          <div class="bar-bg"><div class="bar-fill hp" id="hp-bar-fill"></div></div>
          <span class="val" id="hp-text">0 / 0</span>
        </div>
        <div class="bar-row">
          <span class="label">MP</span>
          <div class="bar-bg"><div class="bar-fill mp" id="mp-bar-fill"></div></div>
          <span class="val" id="mp-text">0 / 0</span>
        </div>
      </div>

      <div class="section">
        <div class="title">스킬 (초보자)</div>
        <div class="skill" data-id="power_strike">
          <span class="kbd">1</span><span class="sname">파워 스트라이크</span><span class="cd" id="cd-power_strike"></span>
        </div>
        <div class="skill" data-id="triple_blow">
          <span class="kbd">2</span><span class="sname">트리플 블로우</span><span class="cd" id="cd-triple_blow"></span>
        </div>
        <div class="skill" data-id="recovery">
          <span class="kbd">3</span><span class="sname">리커버리</span><span class="cd" id="cd-recovery"></span>
        </div>
      </div>
    </div>
    <div id="death-overlay">
      <div class="panel">
        <div class="title">사망</div>
        <div class="sub">잠시 후 부활합니다...</div>
        <div class="countdown" id="respawn-countdown">3.0</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
