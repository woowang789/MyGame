<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyGame</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1a1a1a;
        color: #eee;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #game-root {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        font-size: 13px;
        opacity: 0.85;
        pointer-events: none;
      }
      #chat-box {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 16px;
        width: 520px;
        max-width: 90vw;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        padding: 8px 10px;
        border-radius: 6px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #chat-log {
        height: 120px;
        overflow-y: auto;
        font-size: 12px;
        line-height: 1.5;
        margin-bottom: 6px;
      }
      #chat-log .sys { color: #9fdcff; }
      #chat-log .whisper { color: #ffb4ff; }
      #chat-log .all { color: #ffffff; }
      #chat-input {
        width: 100%;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 13px;
        outline: none;
      }
      #chat-input:focus { border-color: #ffeb8a; }

      /* Phase L — 로그인 화면 */
      #login-root {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f0f17;
        z-index: 100;
      }
      #login-card {
        background: #1b1b2a;
        padding: 28px 32px;
        border-radius: 10px;
        width: 320px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      #login-card h1 {
        margin: 0 0 18px 0;
        font-size: 20px;
        color: #ffeb8a;
        letter-spacing: 0.5px;
      }
      #login-card label {
        display: block;
        font-size: 12px;
        color: #aab;
        margin-top: 10px;
      }
      #login-card input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 8px 10px;
        background: #0e0e18;
        color: #fff;
        border: 1px solid #2a2a3b;
        border-radius: 4px;
        outline: none;
        font-size: 13px;
      }
      #login-card input:focus { border-color: #ffeb8a; }
      #login-buttons {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      #login-buttons button {
        flex: 1;
        padding: 9px 12px;
        background: #2a2a3b;
        color: #fff;
        border: 1px solid #3a3a55;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
      }
      #login-buttons button:hover { background: #3a3a55; }
      #login-buttons button.primary {
        background: #ffeb8a;
        color: #1b1b2a;
        border-color: #ffeb8a;
      }
      #login-buttons button.primary:hover { background: #ffd84a; }
      #login-msg {
        margin-top: 10px;
        font-size: 12px;
        color: #ff7a7a;
        min-height: 16px;
      }
      #login-msg.ok { color: #7aff9c; }

      /* Phase I — 장비 HUD */
      #equip-box {
        position: fixed;
        right: 12px;
        top: 132px;
        width: 180px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.6;
      }
      #equip-box .title {
        color: #ffc64a;
        font-weight: 600;
        margin-bottom: 4px;
      }
      #equip-box .slot { display: flex; justify-content: space-between; }
      #equip-box .slot .name { color: #9fdcff; }
      #equip-box .slot .val { color: #fff; }
      #equip-box .stats {
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid rgba(255,255,255,0.1);
        color: #aee1ff;
      }
      #equip-box .hint {
        margin-top: 6px;
        font-size: 10px;
        color: #888;
      }

      /* Phase M — 스킬 HUD */
      #skill-box {
        position: fixed;
        right: 12px;
        top: 320px;
        width: 200px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
      }
      #skill-box .title {
        color: #ff8aff;
        font-weight: 600;
        margin-bottom: 6px;
      }
      #skill-box .skill {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 3px 0;
      }
      #skill-box .skill .kbd {
        display: inline-block;
        min-width: 16px;
        padding: 1px 4px;
        background: #2a2a3b;
        border: 1px solid #4a4a6a;
        border-radius: 3px;
        font-size: 10px;
        text-align: center;
        color: #ffeb8a;
      }
      #skill-box .skill .sname { flex: 1; }
      #skill-box .skill .cd {
        font-size: 10px;
        color: #ff7a7a;
        min-width: 30px;
        text-align: right;
      }
      #skill-box .skill.cooling { opacity: 0.45; }
      #mp-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
        padding-top: 6px;
        border-top: 1px solid rgba(255,255,255,0.1);
        font-size: 11px;
        color: #aee1ff;
      }
      #mp-bar-bg {
        flex: 1;
        height: 8px;
        background: rgba(0,0,0,0.5);
        border: 1px solid #3a3a55;
        border-radius: 3px;
        overflow: hidden;
      }
      #mp-bar-fill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #4aa3ff, #7bd4ff);
        transition: width 120ms linear;
      }
      /* HP 바는 MP 와 같은 구조 + 붉은 그라데이션 */
      #hp-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
        padding-top: 6px;
        border-top: 1px solid rgba(255,255,255,0.1);
        font-size: 11px;
        color: #ffb0b0;
      }
      #hp-bar-bg {
        flex: 1;
        height: 8px;
        background: rgba(0,0,0,0.5);
        border: 1px solid #553333;
        border-radius: 3px;
        overflow: hidden;
      }
      #hp-bar-fill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #ff4a4a, #ff7a7a);
        transition: width 120ms linear;
      }

      /* 사망 오버레이 */
      #death-overlay {
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.7);
        z-index: 90;
      }
      #death-overlay.active { display: flex; }
      #death-overlay .panel {
        text-align: center;
        padding: 28px 40px;
        background: rgba(30, 0, 0, 0.85);
        border: 1px solid #5a2222;
        border-radius: 10px;
        color: #fff;
      }
      #death-overlay .title {
        font-size: 28px;
        font-weight: 700;
        color: #ff6b6b;
        letter-spacing: 3px;
      }
      #death-overlay .sub {
        margin-top: 8px;
        font-size: 13px;
        color: #aaa;
      }
      #death-overlay .countdown {
        margin-top: 14px;
        font-size: 32px;
        font-weight: 700;
        color: #ffeb8a;
      }
    </style>
  </head>
  <body>
    <div id="login-root">
      <div id="login-card">
        <h1>MyGame 로그인</h1>
        <label for="login-username">아이디 (3~16자, 영숫자/_/-)</label>
        <input id="login-username" type="text" autocomplete="username" maxlength="16" />
        <label for="login-password">비밀번호 (6자 이상)</label>
        <input id="login-password" type="password" autocomplete="current-password" maxlength="64" />
        <div id="login-buttons">
          <button id="btn-login" class="primary" type="button">로그인</button>
          <button id="btn-register" type="button">회원가입</button>
        </div>
        <div id="login-msg"></div>
      </div>
    </div>

    <div id="hud">방향키 이동 · Space 공격 · Enter 채팅 · /w 이름 내용 · Q 장비착용 E 해제</div>
    <div id="game-root"></div>
    <div id="chat-box">
      <div id="chat-log"></div>
      <input id="chat-input" type="text" placeholder="Enter 키로 채팅 시작, /w 닉네임 메시지 로 귓속말" maxlength="200" />
    </div>
    <div id="equip-box">
      <div class="title">장비</div>
      <div class="slot"><span class="name">무기</span><span class="val" id="eq-weapon">-</span></div>
      <div class="slot"><span class="name">모자</span><span class="val" id="eq-hat">-</span></div>
      <div class="slot"><span class="name">갑옷</span><span class="val" id="eq-armor">-</span></div>
      <div class="stats" id="eq-stats">ATK 0 · MAXHP 0</div>
      <div class="hint">Q: 인벤 첫 장비 착용 · E: 전부 해제</div>
    </div>
    <div id="skill-box">
      <div class="title">스킬 (초보자)</div>
      <div class="skill" data-id="power_strike">
        <span class="kbd">1</span><span class="sname">파워 스트라이크</span><span class="cd" id="cd-power_strike"></span>
      </div>
      <div class="skill" data-id="triple_blow">
        <span class="kbd">2</span><span class="sname">트리플 블로우</span><span class="cd" id="cd-triple_blow"></span>
      </div>
      <div class="skill" data-id="recovery">
        <span class="kbd">3</span><span class="sname">리커버리</span><span class="cd" id="cd-recovery"></span>
      </div>
      <div id="hp-row">
        <span>HP</span>
        <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        <span id="hp-text">0 / 0</span>
      </div>
      <div id="mp-row">
        <span>MP</span>
        <div id="mp-bar-bg"><div id="mp-bar-fill"></div></div>
        <span id="mp-text">0 / 0</span>
      </div>
    </div>
    <div id="death-overlay">
      <div class="panel">
        <div class="title">사망</div>
        <div class="sub">잠시 후 부활합니다...</div>
        <div class="countdown" id="respawn-countdown">3.0</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
